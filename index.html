<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cactoys Wiki</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #e0ffe0;
    margin: 0;
    display: flex;
}

#sidebar {
    width: 260px;
    background: #111;
    height: 100vh;
    overflow-y: auto;
    border-right: 1px solid #222;
    padding: 10px;
}

#search {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
}

.item {
    padding: 8px;
    cursor: pointer;
    border-radius: 6px;
}

.item:hover {
    background: #00ff8822;
}

#content {
    flex: 1;
    padding: 20px;
}

h1 {
    color: #00ff88;
}

.link {
    color: #00ffaa;
    cursor: pointer;
    text-decoration: underline;
}

</style>
</head>

<body>

<div id="sidebar">
    <input id="search" placeholder="Search...">
    <div id="list"></div>
</div>

<div id="content">
    <h1>🌵 Cactoys Wiki</h1>
    <p>Select an article on the left.</p>
</div>

<script>
const pages = {
"Banbanzinho": {
text: "Banbanzinho is the main explorer of Cactoys. He travels through portals and investigates mysteries. Related: [Portal], [Seekinho]"
},
"Seekinho": {
text: "Seekinho is a looping entity that observes reality. It appears connected to [Void] and [Crossbuck]."
},
"Portal": {
text: "Portals connect different worlds. Many lead to dangerous places like the [Void] or the [Cactoys Village]."
},
"Void": {
text: "The Void is a dark dimension where reality breaks. Entities like [Seekinho] exist here."
},
"Cactoys Village": {
text: "A planet entirely covered by a looping village. It contains the [Infinite Street]."
},
"Infinite Street": {
text: "A street that appears infinite but loops around the entire planet."
},
"Crossbuck": {
text: "A mysterious entity seen in cameras. It chases observers and may be linked to [Seekinho]."
},
"Cosmic Capybara": {
text: "A giant capybara floating in space beyond normal reality."
},
"Agnes": {
text: "A giant found inside a massive house beyond a portal. Connected to [Unicorn]."
},
"Unicorn": {
text: "A magical toy connected to Agnes."
},

// GERADOR PRA DEIXAR WIKI GIGANTE
...Object.fromEntries(
Array.from({length:200}, (_,i)=>[
"Entity_"+i,
{text:"Generated article about Entity_"+i+" connected to [Void] and [Portal]."}
])
)
};

const listDiv = document.getElementById("list");
const contentDiv = document.getElementById("content");

function renderList(filter=""){
listDiv.innerHTML="";
Object.keys(pages)
.filter(name=>name.toLowerCase().includes(filter.toLowerCase()))
.forEach(name=>{
    const div=document.createElement("div");
    div.className="item";
    div.textContent=name;
    div.onclick=()=>openPage(name);
    listDiv.appendChild(div);
});
}

function openPage(name){
let text = pages[name].text;

// transformar [links] em clicáveis
text = text.replace(/\[(.*?)\]/g, (match,p1)=>{
    return `<span class="link" onclick="openPage('${p1}')">${p1}</span>`;
});

contentDiv.innerHTML = `<h1>${name}</h1><p>${text}</p>`;
}

document.getElementById("search").addEventListener("input", e=>{
renderList(e.target.value);
});

renderList();
</script>

</body>
</html>
